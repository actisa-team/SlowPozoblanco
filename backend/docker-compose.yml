version: '3.8'

services:
  backend:
    build: .
    container_name: pozoblanco-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - UPLOAD_DIR=/app/uploads
      - DB_HOST=postgres
      - DB_USER=pozoblanco
      - DB_PASSWORD=SecurePassword123!
      - DB_NAME=pozoblanco_db
      - REDIS_HOST=redis
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - pozoblanco-net

  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: pozoblanco-db
    restart: always
    environment:
      POSTGRES_USER: pozoblanco
      POSTGRES_PASSWORD: SecurePassword123!
      POSTGRES_DB: pozoblanco_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pozoblanco-net

  redis:
    image: redis:7-alpine
    container_name: pozoblanco-redis
    restart: always
    command: redis-server --requirepass RedisPass123
    ports:
      - "6379:6379"
    networks:
      - pozoblanco-net

networks:
  pozoblanco-net:
    driver: bridge

volumes:
  postgres_data:
